{% extends 'layout.html' %}

{% block title %}
Modifier mon profil
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="card p-4 col-md-5 mx-auto shadow-sm">
        <h3 class="text-center mb-3">Modifier mon profil</h3>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label>Prenom</label>
                {{ form.first_name }}
            </div>

            <div class="mb-3">
                <label>Nom</label>
                {{ form.last_name }}
            </div>

            <div class="mb-3">
                <label>Email</label>
                {{ form.email }}
            </div>

            <button type="submit" class="btn btn-success w-100">
                Enregistrer
            </button>
        </form>
    </div>
</div>

{% endblock %}
